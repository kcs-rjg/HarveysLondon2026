<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Big London Weekend</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<meta name="apple-mobile-web-app-title" content="London Weekend">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --meadow:#F2F6EA;
  --ink:#243120;
  --green:#33613F;
  --green-deep:#24492E;
  --thames:#3A6B9F;
  --sun:#F3B33C;
  --card:#FFFFFF;
  --line:#C9D6BE;
  --muted:#5E6E58;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:var(--meadow);
  color:var(--ink);
  line-height:1.55;
  min-height:100vh;
}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 90px}

/* ---------- header ---------- */
header{
  padding:34px 0 10px;
  text-align:center;
}
.eyebrow{
  font-weight:800;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--green);
}
h1{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(2rem,7vw,3.1rem);
  line-height:1.05;margin:.25rem 0 .4rem;color:var(--green-deep);
}
.sub{color:var(--muted);font-size:.95rem;max-width:34rem;margin:0 auto}

/* ---------- countdown ---------- */
.count{
  margin:20px auto 6px;background:var(--green-deep);color:#F4F8EE;
  border-radius:var(--radius);padding:18px 16px 20px;text-align:center;
  box-shadow:0 6px 0 rgba(36,73,46,.18);
}
.count .label{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#BFD6B5}
.count .big{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(1.3rem,5vw,1.9rem);margin-top:4px}
.count .big b{font-weight:900;color:var(--sun)}

/* ---------- tabs ---------- */
nav{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin:22px 0 18px;position:sticky;top:0;z-index:5;
  background:linear-gradient(var(--meadow) 82%,rgba(242,246,234,0));
  padding:10px 0 12px;
}
.tab{
  border:2px solid var(--green);background:var(--card);color:var(--green-deep);
  font:800 .9rem 'Nunito',sans-serif;border-radius:999px;padding:9px 15px;
  cursor:pointer;display:flex;align-items:center;gap:7px;transition:transform .12s ease;
}
.tab svg{width:17px;height:17px}
.tab:hover{transform:translateY(-2px)}
.tab[aria-selected="true"]{background:var(--green);color:#fff}
.tab.spot[aria-selected="true"]{background:var(--sun);border-color:var(--sun);color:var(--green-deep)}
.tab.spot{border-color:var(--sun)}
.tab:focus-visible,button:focus-visible,a:focus-visible{outline:3px solid var(--thames);outline-offset:2px}

/* ---------- day panel ---------- */
.day-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:6px 2px 4px}
.day-title{font-family:'Fraunces',serif;font-weight:900;font-size:1.55rem;color:var(--green-deep)}
.day-date{color:var(--muted);font-weight:700;font-size:.9rem}
.progress{
  height:12px;background:#DFE9D3;border-radius:99px;overflow:hidden;margin:8px 2px 20px;
}
.progress > div{height:100%;width:0;background:linear-gradient(90deg,var(--green),#5B9A63);border-radius:99px;transition:width .35s ease}
.prog-note{font-size:.82rem;color:var(--muted);font-weight:700;margin:-14px 2px 18px;text-align:right}

/* ---------- trail ---------- */
.trail{list-style:none;position:relative;padding-left:4px}
.trail::before{
  content:"";position:absolute;left:29px;top:14px;bottom:14px;width:0;
  border-left:3px dashed var(--line);
}
.stop{position:relative;padding:0 0 14px 74px;min-height:64px}
.node{
  position:absolute;left:6px;top:2px;width:48px;height:48px;border-radius:50%;
  border:3px solid var(--green);background:var(--card);color:var(--green-deep);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .12s ease,background .2s ease;z-index:1;
}
.node svg{width:24px;height:24px}
.node:hover{transform:scale(1.08)}
.stop.done .node{background:var(--green);border-color:var(--green);color:#fff}
.stop.now .node{border-color:var(--sun);box-shadow:0 0 0 5px rgba(243,179,60,.35)}
.card{
  background:var(--card);border-radius:var(--radius);padding:12px 15px;
  box-shadow:0 2px 0 rgba(36,49,32,.07);
}
.stop.done .card{opacity:.68}
.stop-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.time{font:800 .8rem 'Nunito';color:#fff;background:var(--thames);border-radius:7px;padding:2px 8px;white-space:nowrap}
.stop.now .time{background:var(--sun);color:var(--green-deep)}
.stop-name{font-family:'Fraunces',serif;font-weight:700;font-size:1.08rem}
.detail{font-size:.92rem;color:#41503C;margin-top:4px}
.stop-links{margin-top:6px}
.maplink{
  font-size:.8rem;font-weight:800;color:var(--thames);text-decoration:none;
  border-bottom:2px solid rgba(58,107,159,.3);
}
.maplink:hover{border-bottom-color:var(--thames)}
.donetag{
  display:none;font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--green);border:2px solid var(--green);border-radius:6px;padding:1px 7px;
}
.stop.done .donetag{display:inline-block}
.nowtag{
  display:none;font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--green-deep);background:var(--sun);border-radius:6px;padding:2px 7px;
}
.stop.now .nowtag{display:inline-block}

/* ---------- spotters ---------- */
.spot-intro{text-align:center;color:var(--muted);font-weight:600;margin:4px auto 16px;max-width:30rem}
.bingo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.bcell{
  background:var(--card);border:3px solid var(--line);border-radius:var(--radius);
  padding:14px 6px 12px;text-align:center;cursor:pointer;position:relative;
  font:700 .82rem 'Nunito';color:var(--ink);transition:transform .12s ease;
}
.bcell:hover{transform:translateY(-3px)}
.bcell svg{width:34px;height:34px;display:block;margin:0 auto 6px;color:var(--green-deep)}
.bcell.spotted{border-color:var(--sun);background:#FFF7E3}
.stamp{
  position:absolute;inset:auto 6px 6px auto;width:26px;height:26px;border-radius:50%;
  background:var(--sun);color:var(--green-deep);display:none;align-items:center;justify-content:center;
}
.stamp svg{width:16px;height:16px;margin:0;color:var(--green-deep)}
.bcell.spotted .stamp{display:flex}
.bingo-banner{
  display:none;margin:18px auto 0;text-align:center;background:var(--sun);
  color:var(--green-deep);font-family:'Fraunces',serif;font-weight:900;font-size:1.3rem;
  border-radius:var(--radius);padding:14px;
}
.bingo-banner.show{display:block;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.spot-section{margin-top:28px}
.spot-h{font-family:'Fraunces',serif;font-weight:900;font-size:1.15rem;color:var(--green-deep);margin:0 2px 8px;display:flex;align-items:center;gap:8px}
.spot-h svg{width:20px;height:20px;flex:none}
.bingo.five{grid-template-columns:repeat(2,1fr)}
.bingo.five .bcell:last-child{grid-column:1/-1}
.sync{text-align:center;font-size:.78rem;font-weight:700;color:var(--muted);margin:18px 0 0}
.sync b{color:var(--green)}
.confetti{position:fixed;top:-12px;border-radius:3px;z-index:50;pointer-events:none}

/* ---------- build-an-albert ---------- */
.albert-stage{
  background:var(--card);border-radius:var(--radius);padding:16px 10px 12px;
  margin:8px 0 4px;box-shadow:0 2px 0 rgba(36,49,32,.07);
}
.albert-fig{width:min(230px,62vw);margin:0 auto;display:block}
.albert-fig svg{width:100%;height:auto;display:block;overflow:visible}
.albert-fig.wobble{animation:wobble 1.2s ease}
@keyframes wobble{
  0%,100%{transform:rotate(0)}
  20%{transform:rotate(-4deg)}
  40%{transform:rotate(4deg)}
  60%{transform:rotate(-3deg)}
  80%{transform:rotate(2deg)}
}
.albert-cap{text-align:center;font-weight:800;color:var(--muted);font-size:.85rem;margin-top:8px}
.ghost circle,.ghost rect{fill:none;stroke:var(--line);stroke-width:2;stroke-dasharray:5 5}
.piece{opacity:0;transform:scale(.2);transform-box:fill-box;transform-origin:center}
.piece.on{opacity:1;transform:scale(1)}
.piece.pop{animation:piecePop .55s cubic-bezier(.34,1.56,.64,1) both}
@keyframes piecePop{
  0%{opacity:0;transform:scale(.2)}
  100%{opacity:1;transform:scale(1)}
}
.chip{
  position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:40;
  background:var(--green-deep);color:#fff;border:none;border-radius:999px;
  padding:11px 18px;font:800 .85rem 'Nunito',sans-serif;cursor:pointer;
  display:none;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,.28);
}
.chip.show{display:flex;animation:chipIn .3s ease}
.chip svg{width:16px;height:16px;color:var(--sun)}
@keyframes chipIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* ---------- menu ---------- */
.tab.menu{border-color:var(--thames)}
.tab.menu[aria-selected="true"]{background:var(--thames);border-color:var(--thames);color:#fff}
.who{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin:6px 0 16px;box-shadow:0 2px 0 rgba(36,49,32,.07)}
.who-h{font:800 .78rem 'Nunito';letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.who-chips{display:flex;gap:8px;flex-wrap:wrap}
.pchip{border:2px solid var(--line);background:#fff;color:var(--ink);font:800 .85rem 'Nunito',sans-serif;border-radius:999px;padding:7px 13px;cursor:pointer;transition:transform .12s ease}
.pchip:hover{transform:translateY(-2px)}
.pchip[aria-pressed="true"]{background:var(--green);border-color:var(--green);color:#fff}
.who.attn{animation:attn .5s ease}
@keyframes attn{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}
.meal{background:var(--card);border-radius:var(--radius);padding:14px 15px;margin-bottom:14px;box-shadow:0 2px 0 rgba(36,49,32,.07)}
.meal.info{border-left:6px solid var(--sun)}
.meal-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meal-top svg{width:22px;height:22px;color:var(--green-deep);flex:none}
.meal-name{font-family:'Fraunces',serif;font-weight:700;font-size:1.08rem}
.meal-when{font:800 .78rem 'Nunito';color:#fff;background:var(--thames);border-radius:7px;padding:2px 8px;white-space:nowrap}
.meal-note{font-size:.85rem;color:var(--muted);margin:6px 0 2px}
.opt{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;background:none;border:2px solid var(--line);border-radius:12px;padding:9px 11px;margin-top:8px;cursor:pointer;font:600 .9rem 'Nunito',sans-serif;color:var(--ink);transition:border-color .15s ease}
.opt:hover{border-color:var(--green)}
.opt .box{flex:none;width:22px;height:22px;border-radius:7px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;margin-top:1px;color:#fff;background:#fff}
.opt .box svg{width:14px;height:14px;display:none}
.opt.on{border-color:var(--green);background:#EEF5E7}
.opt.on .box{background:var(--green);border-color:var(--green)}
.opt.on .box svg{display:block}
.opt-body{flex:1}
.badge{display:inline-block;font:800 .62rem 'Nunito',sans-serif;letter-spacing:.06em;border-radius:5px;padding:1px 6px;margin-left:5px;vertical-align:1px}
.badge.gf{background:#E4F0E0;color:var(--green-deep)}
.badge.v{background:#E3ECF6;color:var(--thames)}
.badge.k{background:#FBEED0;color:#8A6510}
.badge.ahead{background:var(--sun);color:var(--green-deep)}
.orderers{font-size:.78rem;font-weight:800;color:var(--thames);margin-top:3px}
.pass{background:var(--green-deep);color:#F4F8EE;border-radius:var(--radius);padding:16px;margin-top:24px}
.pass h2{font-family:'Fraunces',serif;font-weight:900;font-size:1.25rem;display:flex;align-items:center;gap:8px}
.pass h2 svg{width:20px;height:20px;color:var(--sun);flex:none}
.pass-sub{font-size:.82rem;color:#BFD6B5;font-weight:700;margin-top:2px}
.pass-meal{margin-top:12px}
.pm-name{font-weight:800;color:var(--sun);font-size:.82rem;letter-spacing:.06em;text-transform:uppercase}
.pass-meal ul{list-style:none;margin-top:3px}
.pass-meal li{font-size:.88rem;padding:3px 0;border-bottom:1px dashed rgba(255,255,255,.18)}
.pass-meal li b{color:#fff}
.pass-empty{font-size:.88rem;color:#BFD6B5;margin-top:8px}
.copybtn{margin-top:16px;background:var(--sun);color:var(--green-deep);border:none;border-radius:999px;font:800 .85rem 'Nunito',sans-serif;padding:10px 18px;cursor:pointer}
.copybtn:hover{filter:brightness(1.05)}

/* ---------- footer ---------- */
footer{margin-top:34px;text-align:center;color:var(--muted);font-size:.8rem}
footer p+p{margin-top:4px}
.panel{display:none}
.panel.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (max-width:430px){
  .stop{padding-left:66px}
  .trail::before{left:26px}
  .node{width:44px;height:44px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="eyebrow">Thursday 23rd to Sunday 26th July 2026</div>
  <h1>The Big London Weekend</h1>
  <p class="sub">Rachael, Michael, Boden and Blair visit Rob and Will in Putney. Four days of commons, rivers, deer and meerkats.</p>
</header>

<div class="count" id="count">
  <div class="label" id="countLabel">The adventure begins in</div>
  <div class="big" id="countBig">&hellip;</div>
</div>

<nav role="tablist" aria-label="Days of the visit" id="tabs"></nav>

<main id="panels"></main>

<footer>
  <p>Spotter stamps are shared across everyone&rsquo;s phones and saved online.</p>
</footer>
</div>

  heron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 4l3 1-3 1v4c0 4-3 6-6 6v5M11 21h-2M11 18c-3 0-6-2-6-5"/><circle cx="17.5" cy="4.5" r=".5"/></svg>',

        ${I[s.icon]}${s.label}
        <span class="stamp">${I.camera}</span>
      </button>`).join('')}
    </div>
    <div class="bingo-banner" id="banner-albert">Albert\u2019s grand tour of London is complete.</div>
  </div>

  <p class="sync" id="sync">Shared card: connecting&hellip;</p>
  <button class="chip" id="chip">${I.star} New piece found - see Albert grow</button>`;
panelsEl.appendChild(sp);

/* ---------------- menu panel ---------------- */
function badgeHtml(o){
  let b = (o.tags||[]).map(t=>`<span class="badge ${BADGE_CLASS[t]}">${t==='K'?'KIDS':t}</span>`).join('');
  if(o.ahead) b += '<span class="badge ahead">ORDER BY BEDTIME</span>';
  return b;
}
const mp = document.createElement('section');
mp.className='panel'; mp.id='panel-menu'; mp.role='tabpanel';
mp.setAttribute('aria-labelledby','tab-menu');
mp.innerHTML = `
  <div class="day-head"><span class="day-title">Room service</span><span class="day-date">Ch\u00e2teau Putney</span></div>
  <p class="spot-intro">The kitchen respectfully requests that overnight oats are ordered by bedtime the night before. All other orders are taken with good grace and no guarantees.</p>

  <div class="who" id="whoBox">
    <div class="who-h">Who is ordering?</div>
    <div class="who-chips">${PEOPLE.map(p=>`<button class="pchip" data-who="${p}" aria-pressed="false">${p}</button>`).join('')}</div>
  </div>

  ${MEALS.map(m=>`
  <div class="meal${m.info?' info':''}" id="meal-${m.id}">
    <div class="meal-top">${I[m.icon]}<span class="meal-name">${m.name}</span><span class="meal-when">${m.when}</span></div>
    <p class="meal-note">${m.note}</p>
    ${m.info?'':m.options.map(o=>`
      <button class="opt" data-meal="${m.id}" data-opt="${o.id}" aria-pressed="false">
        <span class="box">${I.tick}</span>
        <span class="opt-body">${o.label}${badgeHtml(o)}<div class="orderers" data-orderers></div></span>
      </button>`).join('')}
  </div>`).join('')}

  <div class="pass" id="pass">
    <h2>${I.roast} Chef\u2019s pass</h2>
    <p class="pass-sub">Every order, one list. The chef consults this and no other authority.</p>
    <div id="passBody"></div>
    <button class="copybtn" id="copyPass">Copy for the chef</button>
  </div>`;
panelsEl.appendChild(mp);

/* ---------------- interactions ---------------- */
function selectTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.setAttribute('aria-selected', t.id==='tab-'+id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+id));
}

panelsEl.addEventListener('click',e=>{
  const node = e.target.closest('.node');
  if(node){
    const key = node.dataset.day+'-'+node.dataset.i;
    state.done[key] = !state.done[key];
    const li = document.getElementById(key);
    li.classList.toggle('done', !!state.done[key]);
    node.setAttribute('aria-pressed', !!state.done[key]);
    updateProgress(node.dataset.day);
    return;
  }
  const cell = e.target.closest('.bcell');
  if(cell){
    const set = cell.dataset.grid==='things' ? state.spotted : state.albert;
    if(set.has(cell.dataset.i)) set.delete(cell.dataset.i); else set.add(cell.dataset.i);
    renderCells();
    if(cell.dataset.grid==='things'){
      if(state.spotted.size===SPOTS.length) celebrate('banner-things');
      else document.getElementById('banner-things').classList.remove('show');
    } else {
      document.getElementById('banner-albert').classList.toggle('show', state.albert.size===ALBERT.length);
    }
    lastLocalChange = Date.now();
    saveState();
    albertSync();
    return;
  }
  const pchip = e.target.closest('.pchip');
  if(pchip){
    who = who===pchip.dataset.who ? '' : pchip.dataset.who;
    try{ localStorage.setItem('blw-who', who); }catch(err){}
    renderMenu();
    return;
  }
  const opt = e.target.closest('.opt');
  if(opt){
    if(!who){
      const box = document.getElementById('whoBox');
      box.classList.remove('attn'); void box.offsetWidth; box.classList.add('attn');
      box.scrollIntoView({behavior: reduceMotionQuery() ? 'auto' : 'smooth', block:'center'});
      return;
    }
    toggleOrder(opt.dataset.meal, opt.dataset.opt);
  }
});

function reduceMotionQuery(){
  return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
}

/* ---------------- menu logic ---------------- */
let who = '';
try{ who = localStorage.getItem('blw-who') || ''; }catch(e){}
if(PEOPLE.indexOf(who)===-1) who = '';

function toggleOrder(mealId, optId){
  const meal = state.orders[mealId] = state.orders[mealId] || {};
  const arr = meal[who] = meal[who] || [];
  const ix = arr.indexOf(optId);
  if(ix > -1) arr.splice(ix,1); else arr.push(optId);
  if(arr.length===0) delete meal[who];
  if(Object.keys(meal).length===0) delete state.orders[mealId];
  renderMenu();
  lastLocalChange = Date.now();
  saveState();
}

function ordersFor(mealId, optId){
  const meal = state.orders[mealId] || {};
  return PEOPLE.filter(p=>(meal[p]||[]).indexOf(optId)>-1);
}

function renderMenu(){
  document.querySelectorAll('.pchip').forEach(c=>c.setAttribute('aria-pressed', c.dataset.who===who));
  document.querySelectorAll('.opt').forEach(o=>{
    const names = ordersFor(o.dataset.meal, o.dataset.opt);
    const mine = who && names.indexOf(who)>-1;
    o.classList.toggle('on', mine);
    o.setAttribute('aria-pressed', mine);
    const line = o.querySelector('[data-orderers]');
    line.textContent = names.length ? 'Ordered by '+names.join(', ') : '';
  });
  renderPass();
}

function renderPass(){
  const body = document.getElementById('passBody');
  let html = '';
  MEALS.forEach(m=>{
    if(m.info) return;
    const meal = state.orders[m.id];
    if(!meal) return;
    const lines = m.options.map(o=>{
      const names = ordersFor(m.id, o.id);
      if(!names.length) return '';
      return `<li><b>${names.length}\u00d7</b> ${o.label.split(':')[0].split(',')[0]} \u2014 ${names.join(', ')}${o.ahead?' <b>(prep tonight)</b>':''}</li>`;
    }).join('');
    if(lines) html += `<div class="pass-meal"><div class="pm-name">${m.name} \u00b7 ${m.when}</div><ul>${lines}</ul></div>`;
  });
  body.innerHTML = html || '<p class="pass-empty">No orders yet. The chef will improvise, and nobody wants that.</p>';
}

function passText(){
  let out = 'CHEF\u2019S PASS \u2014 The Big London Weekend\n';
  let any = false;
  MEALS.forEach(m=>{
    if(m.info) return;
    const lines = m.options.map(o=>{
      const names = ordersFor(m.id, o.id);
      if(!names.length) return '';
      return '  - '+names.length+'x '+o.label+(o.ahead?' [prep the night before]':'')+' \u2014 '+names.join(', ');
    }).filter(Boolean);
    if(lines.length){ any = true; out += '\n'+m.name+' ('+m.when+')\n'+lines.join('\n')+'\n'; }
  });
  return any ? out : out+'\nNo orders placed yet.';
}

function renderCells(){
  document.querySelectorAll('.bcell').forEach(c=>{
    const set = c.dataset.grid==='things' ? state.spotted : state.albert;
    const on = set.has(c.dataset.i);
    c.classList.toggle('spotted', on);
    c.setAttribute('aria-pressed', on);
  });
}

function setSync(msg, ok){
  const el = document.getElementById('sync');
  if(el) el.innerHTML = ok ? 'Shared card: <b>'+msg+'</b>' : msg;
}

let ordersRemote = true;
async function loadState(){
  if(!sb){ setSync('Supabase is not connected yet, so stamps stay on this device only.'); return; }
  try{
    const cols = ordersRemote ? 'spotted,albert,orders' : 'spotted,albert';
    const {data, error} = await sb.from('weekend').select(cols).eq('id','family').single();
    if(error){
      if(ordersRemote){ ordersRemote = false; return loadState(); }
      throw error;
    }
    state.spotted = new Set((data.spotted||[]).map(String));
    state.albert = new Set((data.albert||[]).map(String));
    if(ordersRemote) state.orders = data.orders || {};
    renderCells();
    renderMenu();
    document.getElementById('banner-things').classList.toggle('show', state.spotted.size===SPOTS.length);
    document.getElementById('banner-albert').classList.toggle('show', state.albert.size===ALBERT.length);
    setSync(ordersRemote ? 'up to date' : 'up to date (orders on this device only until the orders column is added)', true);
    albertSync();
  }catch(e){
    setSync('Could not reach Supabase, so stamps stay on this device for now.');
  }
}

let saveTimer = null;
function saveState(){
  if(!sb) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const payload = {spotted:[...state.spotted], albert:[...state.albert], updated_at:new Date().toISOString()};
      if(ordersRemote) payload.orders = state.orders;
      const {error} = await sb.from('weekend')
        .update(payload)
        .eq('id','family');
      if(error) throw error;
      setSync('saved', true);
    }catch(e){
      setSync('Save failed. Check the connection and tap again.');
    }
  }, 400);
}

function updateProgress(dayId){
  const d = DAYS.find(x=>x.id===dayId);
  const doneCount = d.stops.filter((_,i)=>state.done[dayId+'-'+i]).length;
  document.getElementById('bar-'+dayId).style.width = (100*doneCount/d.stops.length)+'%';
  document.getElementById('note-'+dayId).textContent =
    doneCount===0 ? '' :
    doneCount===d.stops.length ? 'Day complete. Bravo, team.' :
    doneCount+' of '+d.stops.length+' done';
}

function celebrate(bannerId){
  document.getElementById(bannerId).classList.add('show');
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const colours=['#F3B33C','#33613F','#3A6B9F','#D4593F'];
  for(let i=0;i<36;i++){
    const c=document.createElement('span');
    c.className='confetti';
    c.style.left=(Math.random()*100)+'vw';
    c.style.width=c.style.height=(6+Math.random()*7)+'px';
    c.style.background=colours[i%colours.length];
    const dur=2.2+Math.random()*1.6;
    c.animate([{transform:'translateY(-10px) rotate(0deg)'},{transform:'translateY(105vh) rotate('+(360+Math.random()*360)+'deg)'}],{duration:dur*1000,easing:'ease-in'});
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),dur*1000);
  }
}

/* ---------------- build-an-albert reveal ---------------- */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let revealedPieces = 0;
let albertVisible = false;
let albertInited = false;
let playTimer = null;

function targetPieces(){
  return Math.min(TOTAL_PIECES, state.spotted.size + state.albert.size);
}

function setPiece(i, on, popIn){
  const el = document.getElementById('p'+i);
  if(!el) return;
  el.classList.toggle('on', on);
  el.classList.toggle('pop', !!popIn && on);
  if(!on) el.classList.remove('pop');
}

function updateAlbertCaption(){
  const cap = document.getElementById('albertCap');
  if(!cap) return;
  if(revealedPieces >= TOTAL_PIECES){
    cap.textContent = 'Albert is fully wound up! Champion spotters.';
  } else if(revealedPieces === 0){
    cap.textContent = 'Stamp a square below to start building Albert. 14 pieces to find.';
  } else {
    cap.textContent = revealedPieces + ' of ' + TOTAL_PIECES + ' pieces found';
  }
}

function updateChip(){
  const pending = targetPieces() - revealedPieces;
  document.getElementById('chip').classList.toggle('show', pending > 0 && !albertVisible);
}

function wobble(){
  if(reduceMotion) return;
  const fig = document.getElementById('albertFig');
  fig.classList.remove('wobble');
  void fig.offsetWidth;
  fig.classList.add('wobble');
}

function playQueue(){
  if(playTimer) return;
  const step = ()=>{
    const t = targetPieces();
    if(revealedPieces >= t){
      playTimer = null;
      updateChip();
      if(revealedPieces === TOTAL_PIECES) wobble();
      return;
    }
    setPiece(revealedPieces, true, true);
    revealedPieces++;
    updateAlbertCaption();
    playTimer = setTimeout(step, 450);
  };
  step();
}

function albertSync(){
  const t = targetPieces();
  if(t < revealedPieces){
    for(let i=t; i<revealedPieces; i++) setPiece(i, false);
    revealedPieces = t;
    updateAlbertCaption();
    updateChip();
    return;
  }
  if(t > revealedPieces){
    if(!albertInited || reduceMotion){
      for(let i=revealedPieces; i<t; i++) setPiece(i, true);
      const wasInited = albertInited;
      revealedPieces = t;
      updateAlbertCaption();
      updateChip();
      if(revealedPieces === TOTAL_PIECES && wasInited) wobble();
      return;
    }
    if(albertVisible) playQueue();
    else updateChip();
    return;
  }
  updateChip();
}

/* ---------------- countdown + now/next ---------------- */
const START = new Date(2026,6,23,17,0,0);
const END   = new Date(2026,6,26,15,0,0);
const DAY_DATES = {thu:23,fri:24,sat:25,sun:26};

function tick(){
  const now = new Date();
  const label = document.getElementById('countLabel');
  const big = document.getElementById('countBig');
  if(now < START){
    const ms = START-now;
    const dys = Math.floor(ms/86400000);
    const hrs = Math.floor(ms%86400000/3600000);
    const min = Math.floor(ms%3600000/60000);
    const sec = Math.floor(ms%60000/1000);
    label.textContent = 'The adventure begins in';
    big.innerHTML = `<b>${dys}</b> days <b>${hrs}</b> hrs <b>${min}</b> min <b>${sec}</b> sec`;
  } else if(now <= END){
    const dayName = ['','','','Day 1: arrival day','Day 2: river day','Day 3: show day','Day 4: deer day'][now.getDate()] || 'The weekend';
    label.textContent = 'It is happening';
    big.innerHTML = (now.getMonth()===6 && now.getFullYear()===2026) ? `<b>${dayName}</b>` : '<b>The weekend is here</b>';
    highlightNow(now);
  } else {
    label.textContent = 'The verdict';
    big.innerHTML = '<b>What a weekend that was.</b> Same again next year.';
  }
}

function highlightNow(now){
  if(now.getFullYear()!==2026 || now.getMonth()!==6) return;
  document.querySelectorAll('.stop').forEach(s=>s.classList.remove('now'));
  const todayId = Object.keys(DAY_DATES).find(k=>DAY_DATES[k]===now.getDate());
  if(!todayId) return;
  const d = DAYS.find(x=>x.id===todayId);
  const mins = now.getHours()*60+now.getMinutes();
  const next = d.stops.findIndex(s=>(s.h*60+s.m)>=mins);
  const idx = next===-1 ? d.stops.length-1 : next;
  const li = document.getElementById(todayId+'-'+idx);
  if(li && !li.classList.contains('now')) li.classList.add('now');
}

/* default tab: today's day during the visit, otherwise Thursday */
(function init(){
  const now = new Date();
  let def = 'thu';
  if(now.getFullYear()===2026 && now.getMonth()===6 && DAY_DATES.thu<=now.getDate() && now.getDate()<=DAY_DATES.sun){
    def = Object.keys(DAY_DATES).find(k=>DAY_DATES[k]===now.getDate());
  }
  selectTab(def);
  tick();
  setInterval(tick,1000);
  updateAlbertCaption();
  renderMenu();

  /* copy the chef's pass */
  document.getElementById('copyPass').addEventListener('click',()=>{
    const btn = document.getElementById('copyPass');
    const text = passText();
    const done = ()=>{ btn.textContent = 'Copied. To your stations.'; setTimeout(()=>btn.textContent='Copy for the chef', 2200); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{ window.prompt('Copy the pass below:', text); });
    } else {
      window.prompt('Copy the pass below:', text);
    }
  });

  /* watch Albert: queued pieces reveal only when he is on screen */
  const stage = document.getElementById('albertStage');
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(en=>{ albertVisible = en.isIntersecting; });
    if(albertVisible && !reduceMotion && targetPieces() > revealedPieces) playQueue();
    updateChip();
  }, {threshold:.6});
  obs.observe(stage);

  /* nudge chip scrolls up to Albert */
  document.getElementById('chip').addEventListener('click',()=>{
    selectTab('spotters');
    stage.scrollIntoView({behavior: reduceMotion ? 'auto' : 'smooth', block:'center'});
  });

  loadState().then(()=>{ albertInited = true; });
  setInterval(()=>{ if(Date.now()-lastLocalChange > 8000) loadState(); }, 15000);
})();
</script>
